name: Auto Renew Server Time

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GFE_COOKIE: ${{ secrets.GFE_COOKIE }}
      GFE_SERVER_ID: ${{ secrets.GFE_SERVER_ID }}
      GFE_SERVER_URL: ${{ secrets.GFE_SERVER_URL }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GUI packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot python3-tk

      - name: Install dependencies
        run: |
          npm install
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          seleniumbase install chromedriver

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run renew task
        run: python scripts/gfe_renew_seleniumbase.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gfe-renew-artifacts
          path: artifacts/
          if-no-files-found: ignore

name: 🔄 Gaming4Free 自动续期

# 每 80 分钟执行一次（cron 最小粒度为分钟）
# 80 分钟间隔分解为三条 cron 规则，在 24h 内均匀覆盖 18 个执行点：
#   00:00 01:20 02:40 04:00 05:20 06:40
#   08:00 09:20 10:40 12:00 13:20 14:40
#   16:00 17:20 18:40 20:00 21:20 22:40
on:
  schedule:
    - cron: '0  0,4,8,12,16,20  * * *'
    - cron: '20 1,5,9,13,17,21  * * *'
    - cron: '40 2,6,10,14,18,22 * * *'
  workflow_dispatch:        # 支持手动触发
    inputs:
      debug:
        description: '开启调试输出'
        required: false
        default: 'false'

concurrency:
  group: gaming4free-renew  # 防止多个任务同时运行
  cancel-in-progress: false

jobs:
  renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 拉取代码 ─────────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. 设置 Node.js ──────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. 安装 npm 依赖 ─────────────────────────────────────────────────────
      - name: 📦 安装依赖
        run: npm ci

      # ── 4. 安装 Playwright Chromium（用于失败截图） ──────────────────────────
      - name: 🌐 安装 Playwright Chromium
        run: npx playwright install chromium --with-deps

      # ── 5. 执行续期脚本 ──────────────────────────────────────────────────────
      - name: 🔄 执行续期
        id: renew
        env:
          GAMING4FREE_COOKIES: ${{ secrets.GAMING4FREE_COOKIES }}
          TG_BOT_TOKEN:        ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:          ${{ secrets.TG_CHAT_ID }}
          DEBUG:               ${{ github.event.inputs.debug }}
        run: node scripts/renew.js

      # ── 6. 上传截图 Artifact（仅在失败时） ───────────────────────────────────
      - name: 📸 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot-${{ github.run_number }}
          path: screenshot.png
          retention-days: 7
          if-no-files-found: ignore

      # ── 7. 通过 TG 发送 Actions 链接（仅在失败时，补充通知） ─────────────────
      - name: 📬 发送 Actions 日志链接到 TG
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: |
          LOG_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=🔍 <b>查看完整 Actions 日志：</b>%0A<a href='${LOG_URL}'>点击跳转 GitHub Actions</a>"
